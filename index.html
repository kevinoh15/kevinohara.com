<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kevin O'Hara — UX & Product Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #F5F3EE;
      --card: #FFFFFF;
      --name: #1A1A1A;
      --title: #888888;
      --body: #444444;
      --muted: #BBBBBB;
      --accent: #C96A3A;
      --shadow: 0 8px 40px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .page {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 100vh;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 40px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      perspective: 600px;

      /* entry animation */
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.3s ease forwards;
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="card" id="card">
      <!-- content goes here -->
    </div>
  </main>
  <script>
    // js goes here
  </script>
</body>
</html>
