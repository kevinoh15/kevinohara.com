  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0e0f11;
      --surface: #16181c;
      --border: rgba(255,255,255,0.07);
      --text: #e8e6e2;
      --muted: #8a8580;
      --accent: #c8b89a;
      --hover-bg: rgba(200,184,154,0.07);
      --link-hover: #e8d9c1;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      -webkit-font-smoothing: antialiased;
    }

    /* Visually hidden utility for screen-reader-only text */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* PROFILE */

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      margin-bottom: 2.25rem;
    }

    .avatar-wrap {
      position: relative;
      width: 96px;
      height: 96px;
    }

    .avatar-ring {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--accent), transparent 60%, var(--accent));
      animation: spin 8s linear infinite;
      will-change: transform;
    }

    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--bg);
    }

    .avatar {
      position: relative;
      z-index: 1;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .name {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.6rem, 5vw, 2rem);
      letter-spacing: -0.02em;
      color: var(--text);
      text-align: center;
      line-height: 1.15;
    }

    .tagline {
      font-size: 0.85rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      text-align: center;
    }

    .bio {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--text);
      text-align: center;
      line-height: 1.5;
    }

    /* LINKS */

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* Remove outline on programmatic focus (skip link target) */
    .links:focus {
      outline: none;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.6s ease both;
      will-change: transform;
    }

    .link-item:nth-child(1) { animation-delay: 0.1s; }
    .link-item:nth-child(2) { animation-delay: 0.2s; }
    .link-item:nth-child(3) { animation-delay: 0.3s; }
    .link-item:nth-child(4) { animation-delay: 0.4s; }

    .link-item:hover {
      background: var(--hover-bg);
      border-color: rgba(200,184,154,0.2);
      transform: translateY(-2px);
      color: var(--link-hover);
    }

    .link-item:hover .icon-wrap {
      background: rgba(200,184,154,0.12);
    }

    .icon-wrap {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .icon-wrap svg {
      width: 20px;
      height: 20px;
      fill: var(--accent);
    }

    .link-label {
      font-size: 0.95rem;
      font-weight: 400;
      flex: 1;
    }

    .link-arrow {
      color: var(--muted);
      transition: transform 0.2s, color 0.2s;
    }

    .link-item:hover .link-arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    .link-item:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* FOOTER */

    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    @media (max-width: 360px) {
      body { padding: 1.5rem 0.75rem; }
    }

    @media (max-width: 280px) {
      .link-item { padding: 0.85rem 1rem; }
      .icon-wrap { width: 36px; height: 36px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .avatar-ring,
      .card,
      .link-item {
        animation: none;
      }
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
      }
      html { scroll-behavior: auto; }
    }

    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      background: var(--accent);
      color: var(--bg);
      padding: 0.5rem 1rem;
      border-radius: 0 0 6px 6px;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      z-index: 100;
    }

    .skip-link:focus { top: 0; }
  </style>
