<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kevin O'Hara — UX & Product Designer. Keeping things simple. And fun." />
  <title>Kevin O'Hara — UX & Product Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0e0f11;
      --card: #16181c;
      --name: #e8e6e2;
      --title: #7a7772;
      --body: #e8e6e2;
      --muted: #7a7772;
      --accent: #c8b89a;
      --border: rgba(255,255,255,0.07);
      --shadow: 0 8px 40px rgba(0,0,0,0.4);
      --radius: 12px;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .page {
      width: 100%;
      display: contents;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 40px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      perspective: 600px;

      /* entry animation */
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.3s ease forwards;
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .photo-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      padding: 3px;
      background: conic-gradient(var(--accent), transparent 60%, var(--accent));
      animation: spin 8s linear infinite;
      margin-bottom: 24px;
      flex-shrink: 0;
    }

    .photo-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: var(--card);
    }

    .photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .initials-text {
      display: none;
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--title);
      position: absolute;
    }

    .photo-wrap.initials .photo {
      display: none;
    }

    .photo-wrap.initials .initials-text {
      display: block;
    }

    .name {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--name);
      letter-spacing: -0.5px;
      line-height: 1.15;
      margin-bottom: 6px;
    }

    .title {
      font-size: 14px;
      font-weight: 400;
      color: var(--title);
      letter-spacing: 0.02em;
      margin-bottom: 16px;
    }

    .bio {
      font-size: 15px;
      font-style: italic;
      color: var(--body);
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      margin-bottom: 32px;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 400;
      color: var(--name);
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }

    .link:hover {
      transform: translateY(-2px);
      background: rgba(200, 184, 154, 0.07);
      color: var(--accent);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s ease;
    }

    .link:hover .link-icon {
      background: rgba(200, 184, 154, 0.15);
    }

    .link-label {
      flex: 1;
      text-align: left;
    }

    .link-arrow {
      color: var(--muted);
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .link:hover .link-arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    .link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .link:nth-child(1) { animation-delay: 0.15s; }
    .link:nth-child(2) { animation-delay: 0.25s; }
    .link:nth-child(3) { animation-delay: 0.35s; }
    .link:nth-child(4) { animation-delay: 0.45s; }

    .mantra {
      font-size: 11px;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

@media (max-width: 480px) {
  body {
    padding: 0;
    align-items: stretch;
  }

  .card {
    padding: 40px 28px 28px;
    border-radius: 0;
    box-shadow: none;
    min-height: 100vh;
    justify-content: center;
  }

  .name {
    font-size: 28px;
  }
}
  </style>
</head>

  <script>
    const wrap = document.getElementById('photoWrap');

wrap.addEventListener('mousemove', (e) => {
  const rect = wrap.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = (e.clientX - cx) / (rect.width / 2);
  const dy = (e.clientY - cy) / (rect.height / 2);
  const tiltX = dy * -8;
  const tiltY = dx * 8;
  wrap.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(1.04)`;
});

wrap.addEventListener('mouseleave', () => {
  wrap.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
});
  </script>
