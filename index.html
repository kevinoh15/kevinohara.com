<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kevin O'Hara — UX & Product Designer. Keeping things simple. And fun." />
  <title>Kevin O'Hara — UX & Product Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #F5F3EE;
      --card: #FFFFFF;
      --name: #1A1A1A;
      --title: #888888;
      --body: #444444;
      --muted: #BBBBBB;
      --accent: #C96A3A;
      --shadow: 0 8px 40px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .page {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 100vh;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 40px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      perspective: 600px;

      /* entry animation */
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.3s ease forwards;
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .photo-wrap {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--bg);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.07);
      margin-bottom: 24px;
      position: relative;
      transition: transform 0.15s ease;
      cursor: default;
      flex-shrink: 0;
      background: #E8E4DC;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
    }

    .photo-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(201, 106, 58, 0);
      transition: background 0.2s ease;
      pointer-events: none;
    }

    .photo-wrap:hover::after {
      background: rgba(201, 106, 58, 0.18);
    }

    .photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .initials-text {
      display: none;
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: var(--title);
      position: absolute;
    }

    .photo-wrap.initials .photo {
      display: none;
    }

    .photo-wrap.initials .initials-text {
      display: block;
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--name);
      letter-spacing: -0.5px;
      line-height: 1.15;
      margin-bottom: 6px;
    }

    .title {
      font-size: 14px;
      font-weight: 400;
      color: var(--title);
      letter-spacing: 0.02em;
      margin-bottom: 16px;
    }

    .bio {
      font-size: 15px;
      font-style: italic;
      color: var(--body);
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border: 1.5px solid #E8E4DC;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      color: var(--name);
      text-decoration: none;
      transition: color 0.15s ease, border-color 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .link::after {
      content: '';
      position: absolute;
      bottom: 8px;
      left: 18px;
      right: 18px;
      height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.2s ease;
    }

    .link:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .link:hover::after {
      transform: scaleX(1);
    }

    .mantra {
      font-size: 11px;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

@media (max-width: 480px) {
  body {
    padding: 0;
    align-items: stretch;
  }

  .card {
    padding: 40px 28px 28px;
    border-radius: 0;
    box-shadow: none;
    min-height: 100vh;
    justify-content: center;
  }

  .name {
    font-size: 28px;
  }
}
  </style>
</head>
<body>
  <main class="page">
    <div class="card" id="card">
      <div class="photo-wrap" id="photoWrap">
        <img
          class="photo"
          src="photo.jpg"
          alt="Kevin O'Hara"
          onerror="this.style.display='none'; document.getElementById('photoWrap').classList.add('initials')"
        />
        <span class="initials-text">KO</span>
      </div>
      <h1 class="name">Kevin O'Hara</h1>
      <p class="title">UX &amp; Product Designer</p>
      <p class="bio">I design things people love to use.</p>
      <nav class="links">
        <a class="link" href="https://linkedin.com/in/kevinohara" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          LinkedIn
        </a>
      </nav>
      <p class="mantra">Keeping things simple. And fun.</p>
    </div>
  </main>
  <script>
    const wrap = document.getElementById('photoWrap');

wrap.addEventListener('mousemove', (e) => {
  const rect = wrap.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = (e.clientX - cx) / (rect.width / 2);
  const dy = (e.clientY - cy) / (rect.height / 2);
  const tiltX = dy * -8;
  const tiltY = dx * 8;
  wrap.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(1.04)`;
});

wrap.addEventListener('mouseleave', () => {
  wrap.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
});
  </script>
</body>
</html>
